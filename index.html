<!DOCTYPE html>
<html>
<head>
    <title>እውነተኛ ቢንጎ ካርታ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 20px;
            background-color: #1a1a2e;
            color: white;
        }
        .bingo-table {
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #162447;
            border-radius: 10px;
            overflow: hidden;
        }
        .bingo-table td {
            width: 70px;
            height: 70px;
            border: 2px solid #1f4068;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #e4e4e4;
        }
        .bingo-btn {
            background-color: #e43f5a;
            color: white;
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Walya Bingo - የሙከራ ካርታ</h2>
    <p>ቁጥሮች በፍፁም አይደገሙም!</p>

    <table class="bingo-table">
        <tr>
            <td id="b1">-</td> <td id="b2">-</td> <td id="b3">-</td>
        </tr>
        <tr>
            <td id="b4">-</td> <td id="b5">-</td> <td id="b6">-</td>
        </tr>
        <tr>
            <td id="b7">-</td> <td id="b8">-</td> <td id="b9">-</td>
        </tr>
    </table>
    
    <br>
    <button class="bingo-btn" onclick="generatePerfectCard()">አዲስ ካርታ አውጣ</button>

    <script>
        function generatePerfectCard() {
            let uniqueNumbers = [];
            while(uniqueNumbers.length < 9) {
                let num = Math.floor(Math.random() * 75) + 1;
                if(!uniqueNumbers.includes(num)) {
                    uniqueNumbers.push(num);
                }
            }
            for(let i = 1; i <= 9; i++) {
                document.getElementById("b" + i).innerText = uniqueNumbers[i-1];
            }
        }
    </script>

</body>
</html>
